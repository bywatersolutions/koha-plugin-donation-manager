name: CI
on: [push]
jobs:
  unit_tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        koha-version: [main, stable, oldstable]

    steps:

    - uses: actions/checkout@v4

    - name: Get Koha Version Branch Name
      id: koha-version
      uses: "bywatersolutions/github-action-koha-get-version-by-label@master"
      with:
        version-label: "${{ matrix.koha-version }}"

    - name: Check out Koha and koha-testing-docker
      run: |
        cd ..
        git clone --branch ${{ steps.koha-version.outputs.current-branch-name }} --single-branch --depth 1 https://github.com/Koha-Community/Koha.git kohaclone
        git clone --depth 1 https://gitlab.com/koha-community/koha-testing-docker.git

    - name: Start koha-testing-docker
      run: |
        export KTD_HOME="$GITHUB_WORKSPACE/../koha-testing-docker"
        export SYNC_REPO="$GITHUB_WORKSPACE/../kohaclone"
        export LOCAL_USER_ID="$(id -u)" # Needed for koha-testing-docker
        export KOHA_IMAGE="${{ matrix.koha-version == 'main' && 'main' || steps.koha-version.outputs.version-major-minor }}"
        echo "Using koha/koha-testing:$KOHA_IMAGE"
        cp "$KTD_HOME/env/defaults.env" "$KTD_HOME/.env"
        sudo sysctl -w vm.max_map_count=262144
        "$KTD_HOME/bin/ktd" up -d
        "$KTD_HOME/bin/ktd" --wait-ready 900

    - name: Run tests
      run: |
        docker cp . kohadev-koha-1:/var/lib/koha/kohadev/plugins
        docker exec kohadev-koha-1 bash -c 'prove /var/lib/koha/kohadev/plugins/t'

    - name: Show koha logs on failure
      if: failure()
      run: |
        docker ps -a
        docker logs kohadev-koha-1 2>&1 | tail -200

  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: unit_tests
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v1

    - name: Parse out and store the GitHub repository name
      id: myvars
      run: |
        IFS='/' read -r -a parts <<< "$GITHUB_REPOSITORY"
        GITHUB_REPO="${parts[1]}"
        echo ::set-output name=github_repo::$GITHUB_REPO
        echo "GITHUB REPO: $GITHUB_REPO"

    - name: Get Previous tag
      id: previoustag
      uses: "WyriHaximus/github-action-get-previous-tag@master"
      env:
        GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

    - name: Get next minor version
      id: semvers
      uses: "WyriHaximus/github-action-next-semvers@master"
      with:
        version: ${{ steps.previoustag.outputs.tag }}

    - name: Get Koha Version Branch Name
      id: koha-version-oldstable
      uses: "bywatersolutions/github-action-koha-get-version-by-label@master"
      with:
        version-label: "oldstable"

    - name: Print minimum version
      run: |
        echo "Current oldstable version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}"

    - name: Build Koha Plugin kpz artifact
      id: kpz
      uses: "bywatersolutions/github-action-koha-plugin-create-kpz@master"
      with:
        release-version: ${{ steps.semvers.outputs.patch }}
        release-name: ${{ steps.myvars.outputs.GITHUB_REPO }}
        minimum-version: ${{ steps.koha-version-oldstable.outputs.version-major-minor }}

    - name: See if kpz was created
      run: |
        echo "FILENAME: ${{ steps.kpz.outputs.filename }}"
        ls -alh

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
      with:
        tag_name: ${{ steps.semvers.outputs.v_patch }}
        release_name: Release ${{ steps.semvers.outputs.v_patch }}
        draft: false
        prerelease: false

    - name: Upload Release Asset kpz
      id: upload-release-asset-kpz
      uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./${{ steps.kpz.outputs.filename }}
        asset_name: ${{ steps.kpz.outputs.filename }}
        asset_content_type: application/kpz

    - name: Upload Release Asset PLUGIN.yml
      id: upload-release-asset-meta
      uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./PLUGIN.yml
        asset_name: PLUGIN.yml
        asset_content_type: text/yaml

    - name: Upload Release Asset README.md
      id: upload-release-asset-readme
      uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./README.md
        asset_name: README.md
        asset_content_type: text/markdown

    - name: Upload Release Asset CHANGELOG.md
      id: upload-release-asset-changelog
      uses: actions/upload-release-asset@v1.0.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./CHANGELOG.md
        asset_name: CHANGELOG.md
        asset_content_type: text/markdown
